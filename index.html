    .glow {

    }
    #searchScreen {
      animation: fadeIn 1s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #pass {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #pass:focus {
      transform: scale(1.05);

    }
    .shake {
      animation: shake 0.4s cubic-bezier(0.36, 0, 0.66, -0.56) both;
    }

      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-3px, 0, 0); }

    function checkCode() {
      const input = document.getElementById("pass").value.trim();
      const data = students[input];

      if (data) {
        // Скрываем поисковик и показываем только результат
        document.getElementById("error").classList.add("hidden");
        document.getElementById("searchScreen").classList.add("hidden");
        document.getElementById("resultScreen").classList.remove("hidden");

        document.getElementById("name").innerHTML = data.name;
        document.getElementById("wish").innerHTML = data.wish.replace(/\n/g, "<br><br>");
      } else {
        // Показываем ошибку с анимацией
        const errorEl = document.getElementById("error");
        errorEl.classList.remove("hidden");
        errorEl.classList.add("shake");
        setTimeout(() => errorEl.classList.remove("shake"), 400);
      }
    }

    function resetAll() {
      document.getElementById("pass").value = "";
      document.getElementById("resultScreen").classList.add("hidden");
      document.getElementById("searchScreen").classList.remove("hidden");
      document.getElementById("error").classList.add("hidden");
    }

    // Поддержка клавиши Enter
    document.getElementById("pass").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        checkCode();
      }
    });

    // Автозапуск, если в URL есть параметр ?code=...
    window.addEventListener("load", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const codeFromUrl = urlParams.get("code");
      if (codeFromUrl) {
        document.getElementById("pass").value = codeFromUrl;
        checkCode();
      }
    });
  </script>
